name: Deploy Member App Prototype

on:
  push:
    branches:
      - main
    paths:
      - 'apps/member-app-prototype/**'
      - '.github/workflows/deploy-member-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload member prototype
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/member-app-prototype

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
