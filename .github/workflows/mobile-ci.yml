name: Mobile CI

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run mobile:lint

      - name: Type-check mobile app
        run: npm run mobile:typecheck
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
