name: Member web checks

on:
  pull_request:
    paths:
      - "apps/member-web/**"
      - ".github/workflows/member-web.yml"
  push:
    branches:
      - main
    paths:
      - "apps/member-web/**"
      - ".github/workflows/member-web.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/member-web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      APP_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --package-lock-only
      - run: npm ci
      - id: typecheck
        continue-on-error: true
        run: npm run typecheck -- --pretty false 2>&1 | tee typecheck.log
      - name: Upload typecheck output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: member-web-typecheck
          path: apps/member-web/typecheck.log
      - name: Require successful typecheck
        if: always()
        run: test "${{ steps.typecheck.outcome }}" = "success"
      - id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log
      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: member-web-build
          path: apps/member-web/build.log
      - name: Require successful build
        if: always()
        run: test "${{ steps.build.outcome }}" = "success"
      - name: Package Hostinger upload
        run: |
          rm -f typecheck.log build.log
          zip -r ../../MA-Member-Web-Hostinger.zip . -x "node_modules/*" ".next/*" "*.log"
      - name: Upload Hostinger package
        uses: actions/upload-artifact@v4
        with:
          name: MA-Member-Web-Hostinger
          path: MA-Member-Web-Hostinger.zip
          if-no-files-found: error
