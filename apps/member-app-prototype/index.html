<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#14271f" />
  <title>Melanated Adventurers Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">MELANATED ADVENTURERS</p>
        <h1 id="screen-title">Trailhead</h1>
      </div>
      <button class="icon-button" id="campfire-button" aria-label="Open Campfire">🔥<span class="notification-dot"></span></button>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button data-route="trailhead" class="nav-item active"><span>⌂</span><small>Trailhead</small></button>
      <button data-route="explore" class="nav-item"><span>⌕</span><small>Explore</small></button>
      <button data-route="community" class="nav-item"><span>◉</span><small>Community</small></button>
      <button data-route="passport" class="nav-item"><span>▣</span><small>Passport</small></button>
      <button data-route="more" class="nav-item"><span>•••</span><small>More</small></button>
    </nav>
  </div>

  <template id="trailhead-template">
    <section class="welcome-block">
      <p>Good evening, Jonathan.</p>
      <h2>Your next adventure is already stirring.</h2>
      <div class="status-line"><span class="pulse-dot"></span> Pathfinder dashboard updated moments ago</div>
    </section>
    <section class="tile-grid" aria-label="Trailhead tiles">
      <button class="tile tile-hero tile-photo" data-route="adventure" style="--image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80')">
        <span class="tile-label">NEXT ADVENTURE</span>
        <div>
          <strong>Great Melanated Little Camp of Horrors</strong>
          <span class="tile-meta">Oct 30 • Brooksville</span>
        </div>
        <span class="tile-badge">100 DAYS</span>
      </button>

      <button class="tile tile-tall tile-community" data-route="community">
        <span class="tile-label">COMMUNITY</span>
        <div class="live-stack" aria-hidden="true">
          <span>Ashley shared 24 photos</span>
          <span>Marcus completed his first hike</span>
          <span>18 new stories today</span>
        </div>
        <span class="tile-meta">See what the circle is sharing</span>
      </button>

      <button class="tile tile-small tile-passport" data-route="passport">
        <span class="tile-label">PASSPORT</span>
        <strong>Pathfinder II</strong>
        <span class="mini-progress"><i></i></span>
        <span class="tile-meta">2 trips to next rank</span>
      </button>

      <button class="tile tile-wide tile-journey" data-route="journey">
        <span class="tile-label">MY JOURNEY</span>
        <strong>12 adventures completed</strong>
        <span class="tile-meta">4 states • 9 campouts • 1,000 memories</span>
      </button>

      <button class="tile tile-small tile-accent" data-route="campfire">
        <span class="tile-label">CAMPFIRE</span>
        <strong>3 updates</strong>
        <span class="tile-meta">1 needs attention</span>
      </button>

      <button class="tile tile-wide tile-explore" data-route="explore">
        <span class="tile-label">EXPLORE</span>
        <strong>Find your next outside story</strong>
        <span class="tile-meta">Camping • Water • Trails • Skills</span>
      </button>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
